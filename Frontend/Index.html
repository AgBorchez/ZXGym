<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZXGym - Recepción</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>

    <h1>ZXGym - Recepcion</h1>

    <label class="switch">
  <input type="checkbox" id="theme-toggle">
  <span class="slider"></span>
  Modo Oscuro
</label>

    <div class="tarjeta">
        <h2 id="tituloFormulario">Alta de Nuevo Socio</h2>
        <form id="formSocio" onsubmit="guardarSocio(event)">
            <input type="text" id="dni" placeholder="DNI" required>            
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="telefono" id="telefono" placeholder="Teléfono" required>
            <button type="submit" class="btn-guardar" id="btnSubmit"> Guardar Socio</button>
            <button type="button" onclick="cancelarEdicion()" style="display:none;" id="btnCancelar"> Cancelar</button>
            <div class="Selector-Planes">
                <label>Seleccionar Membresia</label>
                <button id="btn-1mes" type="button" class="btn-Plan" onclick="SelectorPlanes(1, 'btn-1mes')">1 Mes</button>
                <button id="btn-3meses" type="button" class="btn-Plan" onclick="SelectorPlanes(3, 'btn-3meses')">3 Meses</button>
                <button id="btn-6meses" type="button" class="btn-Plan" onclick="SelectorPlanes(6, 'btn-6meses')">6 Meses</button>
                <button id="btn-12meses" type="button" class="btn-Plan" onclick="SelectorPlanes(12, 'btn-12meses')">12 Meses</button>
            </div>
            <p id="infoFechaVencimiento" class="text-muted"></p>
            
        </form>
    </div>

    <div class="tarjeta">
        <h2>Buscar Socio</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="inputBusqueda" placeholder="Buscar por nombre o apellido..." style="flex-grow: 1;">
            <button class="btn-guardar" onclick="buscarSocios()">Buscar</button>
            <button class="btn-eliminar" onclick="limpiarBusqueda()">Limpiar</button>
        </div>
    </div>
    <div class="Header-Tabla">
        <h2>Lista Oficial</h2>
        <div>
            <button id="filtro-Activo" class="btn-filtro" onclick="FiltroEstado(true, 'filtro-Activo')">Mostrar Activos</button>
            <button id="filtro-Vencido" class="btn-filtro" onclick="FiltroEstado(false, 'filtro-Vencido')">Mostrar Vencidos</button>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th onclick="ordenarPor('dni')" style="cursor:pointer">DNI ⬍</th>
                <th onclick="ordenarPor('name')" style="cursor:pointer">Nombre ⬍</th>
                <th onclick="ordenarPor('lastName')" style="cursor:pointer">Apellido ⬍</th>
                <th onclick="ordenarPor('email')" style="cursor:pointer">Email ⬍</th>
                <th onclick="ordenarPor('phone')" style="cursor:pointer">Teléfono</th>
                <th onclick="ordenarPor('joinDate')" style="cursor:pointer">Fecha De ingreso ⬍</th>
                <th onclick="ordenarPor('endDate')" style="cursor:pointer">Fecha de vencimiento ⬍</th>
                <th >Plan</th>
                <th>Acciones</th> </tr>
        </thead>
        <tbody id="tablaSocios">
            </tbody>
    </table>

    <script src="api.js"></script>

    

</body>
</html>
